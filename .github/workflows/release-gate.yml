name: Release gate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run release:check
      - name: Require a frozen-suite packet for ADS behavior changes
        env:
          REGRESSION_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run regression:gate -- --base "$REGRESSION_BASE_SHA"
