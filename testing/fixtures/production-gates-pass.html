<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Production gates pass fixture</title>
    <style>
      body { margin: 0; font: 16px/1.5 system-ui, sans-serif; }
      header, main, footer { padding: 24px; }
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <header><nav aria-label="Primary"><strong>Acme Orders</strong></nav></header>
    <main>
      <h1>Orders</h1>
      <section id="default" hidden><p>Three orders are ready to review.</p></section>
      <section id="loading" hidden><p role="status" aria-live="polite">Loading orders…</p></section>
      <section id="empty" hidden><p>No orders yet.</p></section>
      <section id="error" hidden><p role="alert">Orders could not be loaded.</p></section>
    </main>
    <footer>Acme Operations</footer>
    <script>
      function showState() {
        const state = (location.hash.match(/state=(\w+)/) || [])[1] || 'default';
        for (const name of ['default', 'loading', 'empty', 'error']) {
          document.getElementById(name).hidden = name !== state;
        }
      }
      window.addEventListener('hashchange', showState);
      showState();
    </script>
  </body>
</html>
