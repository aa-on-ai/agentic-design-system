<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Design variations</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f1;
      color: #191918;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: #f4f4f1;
    }

    .variation-shell {
      min-height: 100vh;
    }

    .variation-toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid #d8d8d2;
      background: color-mix(in srgb, #f4f4f1 94%, transparent);
      backdrop-filter: blur(12px);
    }

    .variation-toolbar strong {
      margin-right: 0.5rem;
      font-size: 0.875rem;
    }

    .variation-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .variation-tab {
      min-height: 44px;
      padding: 0.625rem 0.875rem;
      border: 1px solid #bcbcb4;
      border-radius: 999px;
      background: #ffffff;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .variation-tab[aria-selected="true"] {
      border-color: #191918;
      background: #191918;
      color: #ffffff;
    }

    .variation-tab:focus-visible {
      outline: 3px solid #3b82f6;
      outline-offset: 2px;
    }

    .variation-stage {
      width: min(100%, 1440px);
      margin: 0 auto;
    }

    .variation-panel[hidden] {
      display: none;
    }

    .variation-placeholder {
      display: grid;
      min-height: calc(100vh - 70px);
      place-items: center;
      padding: 3rem 1.5rem;
    }

    .variation-placeholder > div {
      width: min(100%, 720px);
      padding: 2rem;
      border: 1px dashed #9b9b93;
      border-radius: 1rem;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="variation-shell">
    <header class="variation-toolbar">
      <strong>Directions</strong>
      <div class="variation-tabs" role="tablist" aria-label="Design directions">
        <button class="variation-tab" type="button" role="tab" aria-selected="true" aria-controls="direction-one" id="tab-one" tabindex="0">
          Thesis one
        </button>
        <button class="variation-tab" type="button" role="tab" aria-selected="false" aria-controls="direction-two" id="tab-two" tabindex="-1">
          Thesis two
        </button>
        <button class="variation-tab" type="button" role="tab" aria-selected="false" aria-controls="direction-three" id="tab-three" tabindex="-1">
          Thesis three
        </button>
        <button class="variation-tab" type="button" role="tab" aria-selected="false" aria-controls="direction-four" id="tab-four" tabindex="-1">
          Thesis four
        </button>
      </div>
    </header>

    <section class="variation-stage">
      <article class="variation-panel" id="direction-one" role="tabpanel" aria-labelledby="tab-one" data-variant-thesis="Thesis one">
        <div class="variation-placeholder"><div>Replace with the complete first direction.</div></div>
      </article>
      <article class="variation-panel" id="direction-two" role="tabpanel" aria-labelledby="tab-two" data-variant-thesis="Thesis two" hidden>
        <div class="variation-placeholder"><div>Replace with the complete second direction.</div></div>
      </article>
      <article class="variation-panel" id="direction-three" role="tabpanel" aria-labelledby="tab-three" data-variant-thesis="Thesis three" hidden>
        <div class="variation-placeholder"><div>Replace with the complete third direction.</div></div>
      </article>
      <article class="variation-panel" id="direction-four" role="tabpanel" aria-labelledby="tab-four" data-variant-thesis="Thesis four" hidden>
        <div class="variation-placeholder"><div>Replace with the complete fourth direction.</div></div>
      </article>
    </section>
  </main>

  <script>
    const tabs = [...document.querySelectorAll('[role="tab"]')];
    function selectTab(nextTab) {
      for (const tab of tabs) {
        const selected = tab === nextTab;
        tab.setAttribute('aria-selected', String(selected));
        tab.tabIndex = selected ? 0 : -1;
        document.getElementById(tab.getAttribute('aria-controls')).hidden = !selected;
      }
      nextTab.focus();
    }

    for (const [index, tab] of tabs.entries()) {
      tab.addEventListener('click', () => selectTab(tab));
      tab.addEventListener('keydown', (event) => {
        if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) return;
        event.preventDefault();
        let nextIndex = index;
        if (event.key === 'ArrowLeft') nextIndex = (index - 1 + tabs.length) % tabs.length;
        if (event.key === 'ArrowRight') nextIndex = (index + 1) % tabs.length;
        if (event.key === 'Home') nextIndex = 0;
        if (event.key === 'End') nextIndex = tabs.length - 1;
        selectTab(tabs[nextIndex]);
      });
    }
  </script>
</body>
</html>
